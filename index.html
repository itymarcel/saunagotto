<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱神 — SAUNAGOTTO</title>
  <link rel="stylesheet" href="style.css">
  <script src="three.min.js"></script>
</head>
<body data-scene="1">

  <!-- WebGL heat haze renders here (fixed, behind everything) -->
  <canvas id="bg"></canvas>

  <!-- Scene 2: ocean video fullscreen cover -->
  <video id="ocean-video" src="ocean.mp4" autoplay loop muted playsinline></video>

  <!-- Scene 3: WebGL sun shader canvas -->
  <canvas id="sun-bg"></canvas>

  <!-- TV-noise overlay for scene transitions -->
  <div id="scene-transition">
    <canvas id="transition-noise"></canvas>
  </div>

  <!-- Scene navigation: invisible 60 px tap/click zones on each edge -->
  <div id="zone-prev" role="button" aria-label="Previous Scene"></div>
  <div id="zone-next" role="button" aria-label="Next Scene"></div>

  <!-- Parallax foreground wrapper (mouse-driven, very subtle) -->
  <div id="parallax-fg">
  <!-- Centered logo stack -->
  <div class="stage">

    <!-- Flicker wrapper: base + video mask + 4 ghost layers -->
    <div class="flicker-wrap">
      <img class="logo-jp base"  src="熱神.png" alt="熱神">
      <img class="logo-jp red"   src="熱神.png" alt="" aria-hidden="true">
      <img class="logo-jp red2"  src="熱神.png" alt="" aria-hidden="true">
      <img class="logo-jp blue"  src="熱神.png" alt="" aria-hidden="true">
      <img class="logo-jp flash" src="熱神.png" alt="" aria-hidden="true">
        <div class="grain-container">
      <canvas class="logo-grain" aria-hidden="true"></canvas>
          </div>
    </div>

    <img class="logo-sub" src="SAUNAGOTTO.png" alt="SAUNAGOTTO">
  </div>
  </div><!-- /parallax-fg -->

  <button id="sound-btn" aria-label="Enable Sound">
    <span class="btn-label" aria-hidden="true"></span>
    <svg class="btn-line" xmlns="http://www.w3.org/2000/svg"
         width="18" height="2" viewBox="0 0 18 2" aria-hidden="true">
      <line x1="0" y1="1" x2="18" y2="1"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="btn-wave" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </span>
  </button>

  <!-- Intro overlay: visible until autoplay succeeds or user taps -->
  <div id="intro-overlay">
    <span class="overlay-text">ELEVATE &#9775; BALANCE</span>
  </div>

  <script src="main.js"></script>
  <script src="coal.js"></script>
  <script src="sound.js"></script>
  <script src="grain.js"></script>
  <script src="scenes.js"></script>

  <script>
    /* ── Overlay coordinator ──────────────────────────────────────
       Hides the overlay and starts the scene animation on either:
         a) autoplay success (dispatched by sound.js), or
         b) user click / tap on the overlay.                       */
    (function () {
      const overlay = document.getElementById('intro-overlay');
      let started = false;

      function startExperience() {
        if (started) return;
        started = true;
        overlay.classList.add('hidden');
        window._saunaStartIntro && window._saunaStartIntro();
      }

      /* Tap / click: also triggers sound (autoplay path handles it separately) */
      overlay.addEventListener('click', function () {
        window._saunaEnableSound && window._saunaEnableSound();
        startExperience();
      });

      /* Autoplay succeeded in sound.js */
      document.addEventListener('sauna:autoplay-ok', startExperience);
    }());
  </script>
</body>
</html>
